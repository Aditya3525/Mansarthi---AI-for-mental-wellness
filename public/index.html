<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Wellbeing AI App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .auth-section {
            text-align: center;
            margin: 30px 0;
            padding: 20px 0;
            border-top: 1px solid #eee;
        }
        
        .auth-section h3 {
            color: #666;
            margin-bottom: 15px;
        }
        
        .auth-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .auth-btn {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s ease;
            display: inline-block;
            text-align: center;
        }
        
        .auth-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
        
        .auth-btn.primary {
            background: #667eea;
            color: white;
        }
        
        .auth-btn.primary:hover {
            background: #5a6fd8;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Welcome to Your Mental Wellbeing Journey</h1>
        
        <div class="auth-section">
            <h3>Already have an account?</h3>
            <div class="auth-buttons">
                <a href="/login" class="auth-btn primary">Sign In</a>
                <a href="/login#signup" class="auth-btn">Sign Up</a>
            </div>
        </div>
        
        <div style="text-align: center; margin: 20px 0; color: #999;">
            <strong>OR</strong>
        </div>
        
        <h3 style="text-align: center; color: #666; margin-bottom: 20px;">Continue as Guest</h3>
        
        <form id="userInfoForm">
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="birthday">Date of Birth:</label>
                <input type="date" id="birthday" name="birthday" required>
            </div>

            <div class="form-group">
                <label for="contact">Contact Number:</label>
                <input type="tel" id="contact" name="contact" required>
            </div>

            <div class="form-group">
                <label for="gender">Gender:</label>
                <select id="gender" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                    <option value="prefer-not-to-say">Prefer not to say</option>
                </select>
            </div>

            <button type="submit">Begin Mental Health Assessment</button>
        </form>
    </div>

    <script>
        document.getElementById('userInfoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const userInfo = {
                name: document.getElementById('name').value,
                birthday: document.getElementById('birthday').value,
                contact: document.getElementById('contact').value,
                gender: document.getElementById('gender').value
            };
            
            localStorage.setItem('userInfo', JSON.stringify(userInfo));
            
            // Redirect to dashboard instead of assessment
            window.location.href = 'dashboard.html';
        });
    </script>
</body>

</html>
