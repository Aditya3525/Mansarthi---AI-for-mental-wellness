<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Journey - Mindful AI Ecosystem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .journey-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            position: relative;
        }
        
        .level-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #FF9800;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            border: 2px solid white;
        }
        
        .user-progress {
            display: flex;
            flex-direction: column;
        }
        
        .user-name {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .user-title {
            font-size: 14px;
            color: #667eea;
            font-weight: 500;
        }
        
        .progress-bar-container {
            margin-top: 8px;
            width: 200px;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .progress-text {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
            display: flex;
            justify-content: space-between;
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
        }
        
        .nav-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            color: #666;
            text-decoration: none;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover, .nav-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }
        
        .main-content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .content-tabs {
            display: flex;
            background: #f8f9ff;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .tab-btn {
            flex: 1;
            padding: 15px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.2s ease;
        }
        
        .tab-btn.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        
        .tab-content {
            padding: 30px;
            min-height: 600px;
        }
        
        .journey-path {
            position: relative;
            padding: 40px 0;
        }
        
        .path-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(to bottom, #4CAF50 0%, #667eea 50%, #9C27B0 100%);
            transform: translateX(-50%);
            border-radius: 2px;
        }
        
        .milestone {
            position: relative;
            margin-bottom: 60px;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .milestone:nth-child(even) {
            flex-direction: row-reverse;
        }
        
        .milestone-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
        }
        
        .milestone.completed .milestone-icon {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.2);
        }
        
        .milestone.current .milestone-icon {
            background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
            box-shadow: 0 0 0 4px rgba(255, 152, 0, 0.2);
            animation: pulse 2s infinite;
        }
        
        .milestone.upcoming .milestone-icon {
            background: #e0e0e0;
            color: #999;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 4px rgba(255, 152, 0, 0.2); }
            50% { box-shadow: 0 0 0 8px rgba(255, 152, 0, 0.1); }
            100% { box-shadow: 0 0 0 4px rgba(255, 152, 0, 0.2); }
        }
        
        .milestone-content {
            flex: 1;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #667eea;
        }
        
        .milestone.completed .milestone-content {
            border-left-color: #4CAF50;
        }
        
        .milestone.current .milestone-content {
            border-left-color: #FF9800;
        }
        
        .milestone-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .milestone-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .milestone-level {
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .milestone.completed .milestone-level {
            background: #4CAF50;
        }
        
        .milestone.current .milestone-level {
            background: #FF9800;
        }
        
        .milestone-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .milestone-requirements {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .requirements-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        .requirement-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .requirement-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }
        
        .requirement-check {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
        }
        
        .requirement-check.completed {
            background: #4CAF50;
        }
        
        .requirement-check.incomplete {
            background: #e0e0e0;
            color: #999;
        }
        
        .milestone-rewards {
            background: #fff3e0;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #FF9800;
        }
        
        .rewards-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .reward-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .reward-item {
            background: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 11px;
            color: #FF9800;
            font-weight: 500;
            border: 1px solid #FFE0B2;
        }
        
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .stats-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .panel-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .stat-item {
            text-align: center;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 12px;
            border-left: 3px solid #667eea;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 11px;
            color: #666;
        }
        
        .achievements-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .achievement-badge {
            aspect-ratio: 1;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            text-align: center;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .achievement-badge:hover {
            transform: scale(1.05);
        }
        
        .achievement-badge.earned {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
        }
        
        .achievement-badge.locked {
            background: #e0e0e0;
            color: #999;
        }
        
        .achievement-name {
            font-size: 8px;
            margin-top: 5px;
            font-weight: 500;
        }
        
        .recent-rewards {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .reward-notification {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f8f9ff;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #4CAF50;
        }
        
        .reward-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }
        
        .reward-details {
            flex: 1;
        }
        
        .reward-title {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            margin-bottom: 2px;
        }
        
        .reward-description {
            font-size: 10px;
            color: #666;
        }
        
        .habits-tracker {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .habit-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #667eea;
        }
        
        .habit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .habit-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .habit-streak {
            background: #4CAF50;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .habit-progress {
            margin-bottom: 15px;
        }
        
        .habit-progress-bar {
            width: 100%;
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .habit-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .habit-week {
            display: flex;
            gap: 5px;
            justify-content: space-between;
        }
        
        .habit-day {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #666;
            font-weight: 500;
        }
        
        .habit-day.completed {
            background: #4CAF50;
            color: white;
        }
        
        .habit-day.today {
            border: 2px solid #667eea;
        }
        
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                order: -1;
            }
        }
        
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .milestone {
                flex-direction: column !important;
                text-align: center;
            }
            
            .milestone:nth-child(even) {
                flex-direction: column !important;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .achievements-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>

            loadUserData();

        function loadUserData() {
            // Load user data from localStorage
            const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
            const practiceData = JSON.parse(localStorage.getItem('practiceData') || '{}');
            const microassessmentHistory = JSON.parse(localStorage.getItem('microassessmentHistory') || '{}');
            
            // Update user name
            if (userInfo.name) {
                document.getElementById('userName').textContent = userInfo.name;
            }
            
            // Calculate stats
            const totalDays = Object.keys(practiceData).length + Object.keys(microassessmentHistory).length;
            const streakDays = calculateCurrentStreak();
            const totalPractices = Object.values(practiceData).reduce((sum, day) => sum + (day.completed ? day.completed.length : 0), 0);
            const milestonesReached = journeyMilestones.filter(m => m.status === 'completed').length;
            
            // Update stats display
            document.getElementById('totalDays').textContent = Math.max(totalDays, 23); // Ensure minimum for demo
            document.getElementById('streakDays').textContent = Math.max(streakDays, 7);
            document.getElementById('totalPractices').textContent = Math.max(totalPractices, 45);
            document.getElementById('milestonesReached').textContent = milestonesReached;
        }

        function calculateCurrentStreak() {
            const practiceData = JSON.parse(localStorage.getItem('practiceData') || '{}');
            const microassessmentHistory = JSON.parse(localStorage.getItem('microassessmentHistory') || '{}');
            
            let streak = 0;
            let checkDate = new Date();
            
            while (true) {
                const dateKey = checkDate.toDateString();
                const hasPractice = practiceData[dateKey] && practiceData[dateKey].completed && practiceData[dateKey].completed.length > 0;
                const hasMicroAssessment = microassessmentHistory[dateKey];
                
                if (hasPractice || hasMicroAssessment) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else if (dateKey === new Date().toDateString()) {
                    // Today doesn't break the streak if nothing completed yet
                    checkDate.setDate(checkDate.getDate() - 1);
                } else {
                    break;
                }
            }
            
            return streak;
        }

        function calculateAndUpdateProgress() {
            // Calculate current XP and level
            const completedMilestones = journeyMilestones.filter(m => m.status === 'completed');
            const totalXP = completedMilestones.reduce((sum, m) => sum + m.xpValue, 0);
            
            // Add additional XP from daily activities
            const bonusXP = 180; // From daily practices, check-ins, etc.
            const currentXP = totalXP + bonusXP;
            
            // Calculate level (every 200 XP = 1 level)
            const currentLevel = Math.floor(currentXP / 200) + 1;
            const xpInCurrentLevel = currentXP % 200;
            const xpForNextLevel = 200;
            
            // Update display
            document.getElementById('levelBadge').textContent = currentLevel;
            document.getElementById('progressText').textContent = `${currentXP}/1000 XP`;
            document.getElementById('progressFill').style.width = `${(currentXP / 1000) * 100}%`;
            
            // Update user title based on level
            const titles = {
                1: "Wellness Beginner",
                2: "Mindful Learner", 
                3: "Practice Builder",
                4: "Mindful Explorer",
                5: "Wellness Enthusiast",
                6: "Harmony Seeker"
            };
            
            document.getElementById('userTitle').textContent = titles[currentLevel] || "Wellness Master";
        }

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName + 'Tab').style.display = 'block';

            currentTab = tabName;
            
            // Load tab-specific content

        // Simulate earning a new reward

            // Add to recent rewards
            recentRewards.unshift({
                icon: icon,
                title: title,
                description: description,
                timeAgo: "just now"
            });
            
            // Keep only last 5 rewards

            // Update display
            renderRecentRewards();
            
            // Show notification
            showRewardNotification(title, description, icon);
        }

        function showRewardNotification(title, description, icon) {
            // Create notification overlay
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
                color: white;
                padding: 30px;
                border-radius: 15px;
                text-align: center;
                z-index: 1000;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
                animation: rewardPop 0.5s ease-out;
            `;
            
            notification.innerHTML = `
                <div style="font-size: 48px; margin-bottom: 15px;">${icon}</div>
                <div style="font-size: 20px; font-weight: 600; margin-bottom: 10px;">${title}</div>
                <div style="font-size: 14px; opacity: 0.9;">${description}</div>
            `;
            
            // Add animation keyframes
            if (!document.getElementById('rewardAnimations')) {
                const style = document.createElement('style');
                style.id = 'rewardAnimations';
                style.textContent = `
                    @keyframes rewardPop {
                        0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
                        50% { transform: translate(-50%, -50%) scale(1.1); }
                        100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
                    }
                `;
                document.head.appendChild(style);
            }
            
            document.body.appendChild(notification);
            
            // Remove after 3 seconds
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
