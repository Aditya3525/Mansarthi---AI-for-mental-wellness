<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Check-in - Mindful AI Ecosystem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .microassessment-container {
            background: white;
            border-radius: 25px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .microassessment-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4CAF50, #2196F3, #9C27B0);
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .header {
            margin-bottom: 30px;
        }
        
        .time-indicator {
            background: #e8f5e8;
            color: #4CAF50;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
        }
        
        .question-container {
            margin-bottom: 30px;
        }
        
        .question-number {
            background: #f0f0f0;
            color: #666;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            margin: 0 auto 20px;
        }
        
        .question-text {
            font-size: 20px;
            color: #333;
            margin-bottom: 25px;
            font-weight: 500;
            line-height: 1.4;
        }
        
        .mood-selector {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .mood-option {
            flex: 1;
            padding: 20px 10px;
            border: 3px solid #f0f0f0;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
            text-align: center;
        }
        
        .mood-option:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateY(-2px);
        }
        
        .mood-option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.05);
        }
        
        .mood-emoji {
            font-size: 32px;
            margin-bottom: 8px;
            display: block;
        }
        
        .mood-label {
            font-size: 12px;
            font-weight: 500;
        }
        
        .slider-container {
            margin: 30px 0;
        }
        
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #666;
        }
        
        .custom-slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #f0f0f0;
            outline: none;
            appearance: none;
            cursor: pointer;
        }
        
        .custom-slider::-webkit-slider-thumb {
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }
        
        .custom-slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }
        
        .tags-container {
            margin: 20px 0;
        }
        
        .tags-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .tags-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
        }
        
        .tag-option {
            padding: 12px 8px;
            border: 2px solid #f0f0f0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            transition: all 0.2s ease;
            background: #fafafa;
        }
        
        .tag-option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .tag-option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }
        
        .progress-dots {
            display: flex;
            gap: 8px;
        }
        
        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e0e0e0;
            transition: all 0.3s ease;
        }
        
        .progress-dot.active {
            background: #667eea;
            transform: scale(1.2);
        }
        
        .nav-button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .next-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .next-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .next-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .completion-screen {
            display: none;
            text-align: center;
        }
        
        .completion-screen.show {
            display: block;
        }
        
        .completion-icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: bounce 1s infinite alternate;
        }
        
        @keyframes bounce {
            from { transform: translateY(0px); }
            to { transform: translateY(-10px); }
        }
        
        .completion-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .completion-message {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .insight-card {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }
        
        .insight-title {
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .insight-text {
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.5;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }
        
        .action-button {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .primary-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .secondary-button {
            background: #f0f0f0;
            color: #666;
        }
        
        .action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .streak-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff6b6b;
            color: white;
            padding: 8px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
        }
        
        @media (max-width: 480px) {
            .microassessment-container {
                padding: 25px;
                margin: 10px;
            }
            
            .mood-selector {
                flex-direction: column;
                gap: 15px;
            }
            
            .tags-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="microassessment-container">
        <div class="streak-indicator" id="streakIndicator">🔥 0 days</div>
        
        <div class="header">
            <div class="time-indicator">⏱️ 30 seconds</div>
            <h1>Daily Check-in</h1>
            <p>Quick wellness pulse check to understand how you're doing today</p>
        </div>
        
        <div id="questionContainer" class="question-container">
            <div class="question-number" id="questionNumber">1</div>
            <div class="question-text" id="questionText"></div>
            <div id="answerContainer"></div>
        </div>
        
        <div class="navigation">
            <div class="progress-dots" id="progressDots"></div>
            <button class="nav-button next-button" id="nextButton" onclick="nextQuestion()" disabled>
                Next
            </button>
        </div>
        
        <div id="completionScreen" class="completion-screen">
            <div class="completion-icon">🌟</div>
            <div class="completion-title">Check-in Complete!</div>
            <div class="completion-message">Thank you for taking a moment to reflect on your wellbeing.</div>
            
            <div class="insight-card">
                <div class="insight-title">Today's Insight</div>
                <div class="insight-text" id="todayInsight">
                    Loading personalized insight...
                </div>
            </div>
            
            <div class="action-buttons">
                <a href="/dashboard" class="action-button primary-button">Go to Dashboard</a>
                <a href="/daily-practice" class="action-button secondary-button">Start Practice</a>
            </div>
        </div>
    </div>

    <script>
        // Microassessment questions (rotating daily)
        const questionSets = [
            // Set 1: Emotional state focus
            [
                {
                    type: 'mood',
                    question: 'How are you feeling right now?',
                    options: [
                        { emoji: '😊', label: 'Great', value: 5 },
                        { emoji: '🙂', label: 'Good', value: 4 },
                        { emoji: '😐', label: 'Okay', value: 3 },
                        { emoji: '😔', label: 'Low', value: 2 },
                        { emoji: '😢', label: 'Struggling', value: 1 }
                    ]
                },
                {
                    type: 'slider',
                    question: 'How would you rate your energy level?',
                    min: 1,
                    max: 10,
                    labels: ['Exhausted', 'Energized']
                },
                {
                    type: 'tags',
                    question: 'What describes your day so far?',
                    options: ['Productive', 'Relaxed', 'Stressful', 'Creative', 'Social', 'Quiet', 'Busy', 'Peaceful']
                }
            ],
            // Set 2: Stress and coping focus
            [
                {
                    type: 'slider',
                    question: 'How stressed do you feel today?',
                    min: 1,
                    max: 10,
                    labels: ['Very calm', 'Very stressed']
                },
                {
                    type: 'mood',
                    question: 'How well did you sleep last night?',
                    options: [
                        { emoji: '😴', label: 'Great', value: 5 },
                        { emoji: '😊', label: 'Good', value: 4 },
                        { emoji: '😐', label: 'Okay', value: 3 },
                        { emoji: '😑', label: 'Poor', value: 2 },
                        { emoji: '😵', label: 'Terrible', value: 1 }
                    ]
                },
                {
                    type: 'tags',
                    question: 'What helped you today?',
                    options: ['Exercise', 'Meditation', 'Music', 'Friends', 'Nature', 'Work', 'Reading', 'Rest']
                }
            ],
            // Set 3: Social and purpose focus  
            [
                {
                    type: 'slider',
                    question: 'How connected do you feel to others?',
                    min: 1,
                    max: 10,
                    labels: ['Very isolated', 'Very connected']
                },
                {
                    type: 'mood',
                    question: 'How motivated do you feel?',
                    options: [
                        { emoji: '🚀', label: 'Very', value: 5 },
                        { emoji: '💪', label: 'Good', value: 4 },
                        { emoji: '👍', label: 'Some', value: 3 },
                        { emoji: '😴', label: 'Low', value: 2 },
                        { emoji: '😞', label: 'None', value: 1 }
                    ]
                },
                {
                    type: 'tags',
                    question: 'What are you grateful for today?',
                    options: ['Health', 'Family', 'Progress', 'Opportunity', 'Peace', 'Learning', 'Support', 'Growth']
                }
            ]
        ];

        let currentQuestionSet = 0;
        let currentQuestion = 0;
        let answers = [];
        let dailyStreak = 0;

        function initializeMicroassessment() {
            // Determine which question set to use (rotates daily)
            const today = new Date();
            const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
            currentQuestionSet = dayOfYear % questionSets.length;
            
            // Load streak
            loadStreak();
            
            // Initialize progress dots
            setupProgressDots();
            
            // Display first question
            displayQuestion();
        }

        function loadStreak() {
            const streakData = JSON.parse(localStorage.getItem('microassessmentStreak') || '{}');
            const today = new Date().toDateString();
            
            if (streakData.lastCompleted === today) {
                // Already completed today
                dailyStreak = streakData.currentStreak || 0;
                document.getElementById('streakIndicator').textContent = `✅ ${dailyStreak} days`;
                return;
            }
            
            dailyStreak = streakData.currentStreak || 0;
            document.getElementById('streakIndicator').textContent = `🔥 ${dailyStreak} days`;
        }

        function setupProgressDots() {
            const questions = questionSets[currentQuestionSet];
            const dotsContainer = document.getElementById('progressDots');
            dotsContainer.innerHTML = '';
            
            questions.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.className = `progress-dot ${index === 0 ? 'active' : ''}`;
                dotsContainer.appendChild(dot);
            });
        }

        function displayQuestion() {
            const questions = questionSets[currentQuestionSet];
            const question = questions[currentQuestion];
            
            document.getElementById('questionNumber').textContent = currentQuestion + 1;
            document.getElementById('questionText').textContent = question.question;
            
            const answerContainer = document.getElementById('answerContainer');
            answerContainer.innerHTML = '';
            
            if (question.type === 'mood') {
                const moodSelector = document.createElement('div');
                moodSelector.className = 'mood-selector';
                
                question.options.forEach((option, index) => {
                    const moodOption = document.createElement('div');
                    moodOption.className = 'mood-option';
                    moodOption.onclick = () => selectMoodOption(index, option.value);
                    
                    moodOption.innerHTML = `
                        <span class="mood-emoji">${option.emoji}</span>
                        <span class="mood-label">${option.label}</span>
                    `;
                    
                    moodSelector.appendChild(moodOption);
                });
                
                answerContainer.appendChild(moodSelector);
                
            } else if (question.type === 'slider') {
                const sliderContainer = document.createElement('div');
                sliderContainer.className = 'slider-container';
                
                sliderContainer.innerHTML = `
                    <div class="slider-label">
                        <span>${question.labels[0]}</span>
                        <span>${question.labels[1]}</span>
                    </div>
                    <input type="range" class="custom-slider" min="${question.min}" max="${question.max}" value="5" 
                           oninput="selectSliderValue(this.value)">
                    <div style="text-align: center; margin-top: 10px; font-weight: 600; color: #667eea;" id="sliderValue">5</div>
                `;
                
                answerContainer.appendChild(sliderContainer);
                
            } else if (question.type === 'tags') {
                const tagsContainer = document.createElement('div');
                tagsContainer.className = 'tags-container';
                
                const tagsLabel = document.createElement('div');
                tagsLabel.className = 'tags-label';
                tagsLabel.textContent = 'Select all that apply:';
                
                const tagsGrid = document.createElement('div');
                tagsGrid.className = 'tags-grid';
                
                question.options.forEach((option, index) => {
                    const tagOption = document.createElement('div');
                    tagOption.className = 'tag-option';
                    tagOption.textContent = option;
                    tagOption.onclick = () => toggleTag(index, option);
                    
                    tagsGrid.appendChild(tagOption);
                });
                
                tagsContainer.appendChild(tagsLabel);
                tagsContainer.appendChild(tagsGrid);
                answerContainer.appendChild(tagsContainer);
            }
            
            // Update progress dots
            document.querySelectorAll('.progress-dot').forEach((dot, index) => {
                dot.classList.toggle('active', index === currentQuestion);
            });
            
            // Reset next button
            document.getElementById('nextButton').disabled = true;
        }

        function selectMoodOption(optionIndex, value) {
            document.querySelectorAll('.mood-option').forEach(opt => opt.classList.remove('selected'));
            document.querySelectorAll('.mood-option')[optionIndex].classList.add('selected');
            
            answers[currentQuestion] = { type: 'mood', value: value, index: optionIndex };
            document.getElementById('nextButton').disabled = false;
        }

        function selectSliderValue(value) {
            document.getElementById('sliderValue').textContent = value;
            answers[currentQuestion] = { type: 'slider', value: parseInt(value) };
            document.getElementById('nextButton').disabled = false;
        }

        function toggleTag(tagIndex, tagText) {
            const tagElement = document.querySelectorAll('.tag-option')[tagIndex];
            const isSelected = tagElement.classList.contains('selected');
            
            if (isSelected) {
                tagElement.classList.remove('selected');
            } else {
                tagElement.classList.add('selected');
            }
            
            // Get all selected tags
            const selectedTags = [];
            document.querySelectorAll('.tag-option.selected').forEach(tag => {
                selectedTags.push(tag.textContent);
            });
            
            answers[currentQuestion] = { type: 'tags', value: selectedTags };
            document.getElementById('nextButton').disabled = selectedTags.length === 0;
        }

        function nextQuestion() {
            const questions = questionSets[currentQuestionSet];
            
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                displayQuestion();
            } else {
                completeAssessment();
            }
        }

        function completeAssessment() {
            // Hide question container
            document.getElementById('questionContainer').style.display = 'none';
            document.querySelector('.navigation').style.display = 'none';
            
            // Save assessment data
            saveMicroassessmentData();
            
            // Update streak
            updateStreak();
            
            // Generate and show insight
            generateTodayInsight();
            
            // Show completion screen
            document.getElementById('completionScreen').classList.add('show');
        }

        function saveMicroassessmentData() {
            const today = new Date().toDateString();
            let microassessmentHistory = JSON.parse(localStorage.getItem('microassessmentHistory') || '{}');
            
            // Calculate composite score
            let totalScore = 0;
            let maxScore = 0;
            
            answers.forEach(answer => {
                if (answer.type === 'mood') {
                    totalScore += answer.value;
                    maxScore += 5;
                } else if (answer.type === 'slider') {
                    totalScore += answer.value;
                    maxScore += 10;
                } else if (answer.type === 'tags') {
                    totalScore += Math.min(answer.value.length * 2, 10); // Max 10 for tags
                    maxScore += 10;
                }
            });
            
            const score = Math.round((totalScore / maxScore) * 100);
            
            microassessmentHistory[today] = {
                answers: answers,
                score: score,
                questionSet: currentQuestionSet,
                completedAt: new Date().toISOString()
            };
            
            localStorage.setItem('microassessmentHistory', JSON.stringify(microassessmentHistory));
        }

        function updateStreak() {
            const today = new Date().toDateString();
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toDateString();
            
            let streakData = JSON.parse(localStorage.getItem('microassessmentStreak') || '{}');
            
            if (streakData.lastCompleted === yesterdayStr) {
                // Continuing streak
                streakData.currentStreak = (streakData.currentStreak || 0) + 1;
            } else if (streakData.lastCompleted !== today) {
                // New streak or broken streak
                streakData.currentStreak = 1;
            }
            
            streakData.lastCompleted = today;
            streakData.longestStreak = Math.max(streakData.longestStreak || 0, streakData.currentStreak);
            
            localStorage.setItem('microassessmentStreak', JSON.stringify(streakData));
            
            // Update display
            document.getElementById('streakIndicator').textContent = `🔥 ${streakData.currentStreak} days`;
        }

        function generateTodayInsight() {
            const today = new Date().toDateString();
            const microassessmentHistory = JSON.parse(localStorage.getItem('microassessmentHistory') || '{}');
            const todayData = microassessmentHistory[today];
            
            if (!todayData) return;
            
            const insights = generatePersonalizedInsight(todayData, microassessmentHistory);
            document.getElementById('todayInsight').textContent = insights;
        }

        function generatePersonalizedInsight(todayData, history) {
            const userPath = JSON.parse(localStorage.getItem('userPath') || '{}');
            const score = todayData.score;
            
            // Get trend over last 7 days
            const last7Days = [];
            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const dateStr = date.toDateString();
                if (history[dateStr]) {
                    last7Days.push(history[dateStr].score);
                }
            }
            
            const avgWeeklyScore = last7Days.length > 0 ? 
                last7Days.reduce((a, b) => a + b, 0) / last7Days.length : score;
            
            // Generate path-specific insights
            const pathInsights = {
                western: [
                    `Your wellness score of ${score}% shows ${score > avgWeeklyScore ? 'improvement' : 'consistency'}. Consider using CBT techniques to maintain positive thought patterns.`,
                    `Based on your responses, structured goal-setting might help. Break today's challenges into manageable steps.`,
                    `Your emotional regulation seems ${score >= 70 ? 'strong' : 'developing'}. Practice thought-record exercises to build awareness.`
                ],
                eastern: [
                    `Your inner state reflects a score of ${score}%. Take a moment to breathe deeply and appreciate this moment of self-awareness.`,
                    `Your responses suggest ${score >= 70 ? 'good balance' : 'need for grounding'}. Consider a brief meditation to center yourself.`,
                    `Notice how you're feeling without judgment. This awareness itself is a step toward greater peace and wellbeing.`
                ],
                hybrid: [
                    `Your ${score}% wellness score combines both practical assessment and mindful awareness. This balanced approach serves you well.`,
                    `Consider both structured action and mindful presence today. Set one clear intention while staying open to the moment.`,
                    `Your responses show both thinking and feeling aspects. Honor both by planning mindfully and acting with awareness.`
                ]
            };
            
            const pathKey = userPath.path || 'hybrid';
            const pathSpecificInsights = pathInsights[pathKey];
            
            // Select insight based on score and trend
            if (score >= 80) {
                return pathSpecificInsights[0];
            } else if (score >= 60) {
                return pathSpecificInsights[1];
            } else {
                return pathSpecificInsights[2];
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeMicroassessment);
    </script>
</body>
</html>
